services:
  - type: web
    name: complycart
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: GEMINI_API_KEY
        sync: false
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
